  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: 'left'

costs:
  year: 2030

solver:
    name: gurobi
    options: gurobi-default

solving:
  solver: # Select the solver
    name: gurobi
    options: gurobi-default
  solver_options:
    gurobi-default:
      threads: 8 # Use more of the RAM ! Check message in the terminal about reducing 