run:
  name: 128_wAT_entsoe_David
  disable_progressbar: false
  shared_resources:
    policy: false
  shared_cutouts: true
scenario:
  simpl:
  - ''
  ll:
  - vopt
  clusters:
  - 128
  opts:
  - ''
  sector_opts:
  - ''
